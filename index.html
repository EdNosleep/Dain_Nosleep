<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>NosleepEngine — beta</title>

  <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="color-scheme" content="dark light" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    :root {
      --vh: 1vh;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-left: env(safe-area-inset-left);
      --safe-right: env(safe-area-inset-right);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      image-rendering: auto;
    }

    body {
      background: #000;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: #000 url("./assets/background/background.png") center center / cover no-repeat;
      z-index: -1;
      will-change: transform;
      transform: translateZ(0);
    }

    #game-root {
      position: fixed;
      left: 0; right: 0; top: 0; bottom: 0;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
      padding-left: var(--safe-left);
      padding-right: var(--safe-right);
      width: 100%;
      height: calc(var(--vh) * 100);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #orientation-lock {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      z-index: 9999;
    }

    #orientation-lock .card {
      max-width: 420px;
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 20px 16px;
      backdrop-filter: blur(6px);
    }

    #orientation-lock h1 {
      font-size: 18px;
      margin: 0 0 8px 0;
    }

    #orientation-lock p {
      opacity: 0.8;
      margin: 0;
      line-height: 1.35;
      font-size: 14px;
    }

    @media (orientation: landscape) {
      #orientation-lock { display: flex; }
    }

    #boot {
      position: absolute;
      bottom: calc(var(--safe-bottom, 0px) + 18px);
      left: 50%;
      transform: translateX(-50%);
      width: min(280px, calc(100vw - 44px));
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: rgba(255,255,255,0.88);
      background: rgba(0,0,0,0.46);
      padding: 10px 12px 11px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.16);
      pointer-events: none;
      opacity: 0.96;
      z-index: 10000;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 34px rgba(0,0,0,0.55);
    }

    #boot-label {
      font-size: 12px;
      line-height: 1;
      margin-bottom: 8px;
      opacity: 0.9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #boot-bar {
      width: 100%;
      height: 5px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.14);
    }

    #boot-progress {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #00ccff, #ffffff);
      box-shadow: 0 0 16px rgba(0,204,255,0.8);
      transition: width 0.18s ease;
    }
  </style>

  <link rel="preload" as="image" href="./assets/background/background.png" />
  <link rel="preload" as="image" href="./assets/coin/coin8/coin_avers.png" />
  <link rel="preload" as="image" href="./assets/coin/coin8/coin_revers.png" />
  <link rel="preload" as="image" href="./assets/coin/coin8/coin_edge.png" />
</head>

<body>
  <div id="game-root">
    <div id="boot">
      <div id="boot-label">Загрузка движка…</div>
      <div id="boot-bar">
        <div id="boot-progress"></div>
      </div>
    </div>
  </div>

  <div id="orientation-lock" aria-hidden="true">
    <div class="card">
      <h1>Поверните устройство</h1>
      <p>Игра работает только в портретной ориентации.</p>
    </div>
  </div>

  <script>
    (function fastBoot() {
      const setVh = () => {
        const vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
      };

      setVh();
      window.addEventListener('resize', setVh);
      window.addEventListener('orientationchange', setVh);

      const imgs = [
        './assets/background/background.png',
        './assets/coin/coin8/coin_avers.png',
        './assets/coin/coin8/coin_revers.png',
        './assets/coin/coin8/coin_edge.png'
      ];

      imgs.forEach(src => {
        const i = new Image();
        i.decoding = 'async';
        i.src = src;
      });

      let lastTouch = 0;
      document.addEventListener('touchend', (e) => {
        const now = window.performance.now();
        if (now - lastTouch <= 300) e.preventDefault();
        lastTouch = now;
      }, { passive: false });
    })();
  </script>

  <script type="module" src="./main.js" defer></script>
</body>
</html>
